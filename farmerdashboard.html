function getCurrentUser() {

        const raw = localStorage.getItem("agrihub_user");

            return null;
        }

let isVerified = false;

async function loadVerification() {
  const { data, error } = await sb
    .from("verifications")
    .select("user_id, status");

  if (error) {
    console.error(error);
    return;
  }

  const my = data?.find(v => v.user_id === user.id);

  const status = (my?.status || "notverified").toLowerCase();

  // 🔥 SINGLE SOURCE OF TRUTH
  isVerified = ["verified", "approved"].includes(status.toLowerCase());

  console.log("VERIFICATION STATUS:", status, "isVerified:", isVerified);

  updateVerificationUI(status);

  // refresh feed AFTER status is known
  renderFeed(allProducts);

}

/* =========================
   UPDATE UI STATUS CARD
========================= */
function updateVerificationUI(status) {
  const badge = document.getElementById("verifyStatus");
  if (!badge) return;

  // reset classes first
  badge.classList.remove("verified", "pending", "rejected", "notverified");

  const normalized = (status || "notverified").toLowerCase();

  if (normalized === "verified" || normalized === "approved") {
    badge.innerText = "Verified";
    badge.classList.add("verified");
  }

  else if (normalized === "pending") {
    badge.innerText = "Pending Review";
    badge.classList.add("pending");
  }

  else if (normalized === "rejected") {
    badge.innerText = "Rejected";
    badge.classList.add("rejected");
  }

  else {
    badge.innerText = "Not Verified";
    badge.classList.add("notverified");
  }
}

   FEED
========================= */
async function loadFeed() {
  const { data } = await sb
    .from("products")
    .select("*")
    .order("created_at", { ascending: false });

  allProducts = data || [];
  updateStats(allProducts);
  renderFeed(allProducts);
}

/* =========================
   TIME FORMAT
========================= */
function formatTimeAgo(date) {
  const diff = Math.floor((new Date() - new Date(date)) / 1000);
  if (diff < 60) return diff + "s ago";
  if (diff < 3600) return Math.floor(diff / 60) + "m ago";
  if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
  return Math.floor(diff / 86400) + "d ago";
}

    feed.appendChild(div);

    // ======================

    div.querySelector(".whatsapp-btn").addEventListener("click", () => {

        showVerifyPopup();
        return;
      }

      if (!hasWhatsApp) return;

      window.open(`https://wa.me/${whatsappNumber}`, "_blank");
    });

    // ======================
    // MESSAGE CLICK
    // ======================
    div.querySelector(".message-btn-post").addEventListener("click", () => {
      if (!isVerified) {
        showVerifyPopup();
        return;
      }

      if (!sellerId) return;

      openChat(sellerId, sellerName);
    });

  });
}

  renderFeed(
    allProducts.filter(p =>
      (p.category || "").toLowerCase() === cat
    )
  );
}

/* =========================
   OPEN CHAT
========================= */
async function openChat(otherUserId, otherUserName) {

  if (!otherUserId) {
    alert("Seller ID missing.");
    return;
  }

  if (String(otherUserId) === String(user.id)) {
    alert("You cannot message yourself.");
    return;
  }

  try {

    // Look for an existing conversation
    let { data: conversation, error } = await sb
      .from("conversations")
      .select("*")
      .or(
        `and(user1.eq.${user.id},user2.eq.${otherUserId}),and(user1.eq.${otherUserId},user2.eq.${user.id})`
      )
      .maybeSingle();

    if (error) {
      console.error("Conversation lookup:", error);
      alert(error.message);
      return;
    }

    // Create one if it doesn't exist
    if (!conversation) {

      const { data, error: createError } = await sb
        .from("conversations")
        .insert([
          {
            user1: user.id,
            user2: otherUserId
          }
        ])
        .select()
        .single();

      if (createError) {
        console.error("Conversation create:", createError);
        alert(createError.message);
        return;
      }

      conversation = data;
    }

    localStorage.setItem("chat_id", conversation.id);
    localStorage.setItem("chat_user", otherUserId);
    localStorage.setItem("chat_name", otherUserName);

    window.location.href = "chat.html";

  } catch (err) {
    console.error(err);
    alert("Failed to open chat.");
  }
}

async function loadUnreadMessages() {
  try {
    const { data: conversations } = await sb
      .from("conversations")
      .select("id")
      .or(`user1.eq.${user.id},user2.eq.${user.id}`);

    const badge = document.getElementById("messageBadge");
    if (!badge) return;

    if (!conversations || conversations.length === 0) {
      badge.style.display = "none";
      return;
    }

    const ids = conversations.map(c => c.id);

    const { count } = await sb
      .from("messages")
      .select("*", { count: "exact", head: true })
      .in("conversation_id", ids)
      .neq("sender_id", user.id)
      .eq("is_read", false);

    if (count && count > 0) {
      badge.style.display = "flex";
      badge.innerText = count > 99 ? "99+" : count;
    } else {
      badge.style.display = "none";
    }

  } catch (err) {
    console.error("Badge error:", err);
  }
}
sb.channel("messages-badge-live")
  .on(
    "postgres_changes",
    {
      event: "*",
      schema: "public",
      table: "messages"
    },
    () => {
      loadUnreadMessages();
    }
  )
  .subscribe();

let lastScrollTop = 0;

const bottomNav = document.getElementById("bottomNav");
const categoryBar = document.getElementById("categoryBar");

window.addEventListener("scroll", function () {

    let scrollTop = window.pageYOffset || document.documentElement.scrollTop;

    // SCROLLING DOWN
    if (scrollTop > lastScrollTop && scrollTop > 50) {

        bottomNav.classList.add("hide");
        categoryBar.classList.add("hide");

    }

    // SCROLLING UP
    else {

        bottomNav.classList.remove("hide");
        categoryBar.classList.remove("hide");

    }

    lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
