<style>
body{
  margin:0;
  font-family:system-ui, Arial, sans-serif;
  background:#e5ddd5;
}

/* HEADER */
.header{
  background:#075e54;
  color:white;
  padding:14px 16px;
  font-weight:800;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:10;
}

.back{
  color:white;
  text-decoration:none;
  font-weight:600;
}

/* LIST */
.list{
  display:flex;
  flex-direction:column;
}

/* CHAT ITEM */
.chat{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  background:white;
  border-bottom:1px solid #eee;
  cursor:pointer;
  transition:0.2s;
}

.chat:hover{
  background:#f7f7f7;
}

/* AVATAR */
.avatar{
  width:48px;
  height:48px;
  border-radius:50%;
  background:#1f8f4e;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  font-size:16px;
  flex-shrink:0;
  text-transform:uppercase;
}

/* CHAT CONTENT */
.chat-content{
  flex:1;
  min-width:0;
}

.top-line{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.name{
  font-weight:700;
  color:#111;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.last{
  font-size:13px;
  color:#555;
  margin-top:3px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* RIGHT SIDE */
.right-side{
  margin-left:auto;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:6px;
  flex-shrink:0;
}

.time{
  font-size:11px;
  color:#999;
}

.unread-badge{
  min-width:20px;
  height:20px;
  padding:0 6px;
  border-radius:999px;
  background:#25d366;
  color:white;
  font-size:11px;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
}

.empty{
  padding:20px;
  color:#444;
  text-align:center;
}

.loading{
  padding:20px;
  text-align:center;
  color:#555;
}
</style>
</head>

/* GET REAL USER NAME FROM profiles */
function getUserNameFromConversation(conv){

  if(String(conv.user1) === String(user.id)){
      return conv.user2_data?.full_name || "Unknown User";
  }

  return conv.user1_data?.full_name || "Unknown User";
}
/* INITIALS */
function getInitials(name){
  if(!name) return "U";

  const parts = name.trim().split(/\s+/).filter(Boolean);

  if(parts.length === 1){
    return parts[0].charAt(0).toUpperCase();
  }

  return (parts[0][0] + parts[1][0]).toUpperCase();
}

/* LAST MESSAGE */
async function getLastMessage(conversationId){
  const { data, error } = await sb2
    .from("messages")
    .select("*")
    .eq("conversation_id", conversationId)
    .order("created_at", { ascending:false })
    .limit(1)
    .maybeSingle();

  if(error){
    console.error("LAST MESSAGE ERROR:", error);
    return null;
  }

  return data || null;
}

/* UNREAD COUNT */
async function getUnreadCount(conversationId){
  const { count, error } = await sb2
    .from("messages")
    .select("*", { count: "exact", head: true })
    .eq("conversation_id", conversationId)
    .neq("sender_id", user.id)
    .eq("is_read", false);

  if(error){
    console.error("UNREAD COUNT ERROR:", error);
    return 0;
  }

  return count || 0;
}

/* FORMAT TIME */
function formatTime(dateString){
  if(!dateString) return "";
  return new Date(dateString).toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit'
  });
}

/* OPEN CHAT */
async function openChat(chatId, otherUserId, realName) {

  const { error } = await sb2
    .from("messages")
    .update({ is_read: true })
    .eq("conversation_id", chatId)
    .neq("sender_id", user.id)
    .eq("is_read", false);

  if (error) {
    console.error("Failed to mark messages as read:", error);
  }

  // Refresh inbox locally
  await loadInbox();

  localStorage.setItem("chat_id", chatId);
  localStorage.setItem("chat_user", otherUserId);
  localStorage.setItem("chat_name", realName);

  window.location.href = "chat.html";
}

/* INITIAL LOAD */

      schema: "public",
      table: "messages"
    },
   (payload) => {

  if (payload.new.sender_id !== user.id) {

    // update inbox first
    clearTimeout(window.inboxTimeout);

async function updatePresence() {

  const user = JSON.parse(localStorage.getItem("agrihub_user"));
  if (!user) return;

  const { error } = await sb2
    .from("users")
    .update({
      online: true,
      last_seen: new Date().toISOString()
    })
    .eq("id", user.id);

  if (error) {
    console.error("Presence update failed:", error);
  } else {
    console.log("Presence updated successfully");
  }
}

// Run immediately

document.addEventListener("click", () => {
  notificationSound.play().then(() => {

  }).catch(() => {});
}, { once: true });
async function deleteConversation(conversationId) {

  // Delete all messages
  const { error: msgError } = await sb2
    .from("messages")
    .delete()
    .eq("conversation_id", conversationId);

  if (msgError) {
    console.error(msgError);
    alert("Failed to delete messages.");
    return;
  }

  // Delete conversation
  const { error: convError } = await sb2
    .from("conversations")
    .delete()
    .eq("id", conversationId);

  if (convError) {
    console.error(convError);
    alert("Failed to delete conversation.");
    return;
  }

  loadInbox();
}
function showDeleteConversation(conversationId) {
