<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox - AgriHub</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:system-ui, Arial, sans-serif;
  background:#e5ddd5;
}

/* HEADER */
.header{
  background:#075e54;
  color:white;
  padding:14px 16px;
  font-weight:800;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:10;
}

.back{
  color:white;
  text-decoration:none;
  font-weight:600;
}

/* LIST */
.list{
  display:flex;
  flex-direction:column;
}

/* CHAT ITEM */
.chat{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  background:white;
  border-bottom:1px solid #eee;
  cursor:pointer;
  transition:0.2s;
}

.chat:hover{
  background:#f7f7f7;
}

/* AVATAR */
.avatar{
  width:48px;
  height:48px;
  border-radius:50%;
  background:#1f8f4e;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  font-size:16px;
  flex-shrink:0;
  text-transform:uppercase;
}

/* CHAT CONTENT */
.chat-content{
  flex:1;
  min-width:0;
}

.top-line{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.name{
  font-weight:700;
  color:#111;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.last{
  font-size:13px;
  color:#555;
  margin-top:3px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* RIGHT SIDE */
.right-side{
  margin-left:auto;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:6px;
  flex-shrink:0;
}

.time{
  font-size:11px;
  color:#999;
}

.unread-badge{
  min-width:20px;
  height:20px;
  padding:0 6px;
  border-radius:999px;
  background:#25d366;
  color:white;
  font-size:11px;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
}

.empty{
  padding:20px;
  color:#444;
  text-align:center;
}

.loading{
  padding:20px;
  text-align:center;
  color:#555;
}
</style>
</head>

<body>

<div class="header">
  <a class="back" href="farmerdashboard.html">← Back</a>
  <span>Messages</span>
  <span></span>
</div>

<div class="list" id="list">
  <div class="loading">Loading...</div>
</div>

<script>
const sb2 = supabase.createClient(
  "https://wfbepkegbtxszhhozqtz.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmYmVwa2VnYnR4c3poaG96cXR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMjE4NjEsImV4cCI6MjA5NzY5Nzg2MX0.RkyZ4Jszz9KbNP9fk4MldMX2S1416eYFR8GHhPzRGJc"
);

const user = JSON.parse(localStorage.getItem("agrihub_user"));

if(!user){
  window.location.href = "index.html";
}

/* GET OTHER USER ID */
function getOtherUser(conv){
  return String(conv.user1) === String(user.id) ? String(conv.user2) : String(conv.user1);
}

/* GET REAL USER NAME FROM profiles */
async function getUserName(otherUserId){
  console.log("========== NAME DEBUG START ==========");
  console.log("otherUserId from conversation:", otherUserId);

  try {
    // 1) CHECK users TABLE
    const { data: userRow, error: userErr } = await sb2
      .from("users")
      .select("*")
      .eq("id", otherUserId)
      .maybeSingle();

    console.log("USERS RESULT:", userRow);
    console.log("USERS ERROR:", userErr);

    // 2) CHECK profiles TABLE USING SAME ID
    const { data: profileRow, error: profileErr } = await sb2
      .from("profiles")
      .select("*")
      .eq("id", otherUserId)
      .maybeSingle();

    console.log("PROFILES RESULT:", profileRow);
    console.log("PROFILES ERROR:", profileErr);

    // 3) CHECK products TABLE USING user_id
    const { data: productRows, error: productErr } = await sb2
      .from("products")
      .select("*")
      .eq("user_id", otherUserId)
      .limit(5);

    console.log("PRODUCTS RESULT:", productRows);
    console.log("PRODUCTS ERROR:", productErr);

    // 4) TEMP RETURN SO PAGE STILL WORKS
    if (userRow?.full_name) return userRow.full_name;
    if (profileRow?.full_name) return profileRow.full_name;
    if (profileRow?.name) return profileRow.name;

    return "Unknown User";
  } catch (err) {
    console.error("GET USER NAME CATCH:", err);
    return "Unknown User";
  }
}
/* INITIALS */
function getInitials(name){
  if(!name) return "U";

  const parts = name.trim().split(/\s+/).filter(Boolean);

  if(parts.length === 1){
    return parts[0].charAt(0).toUpperCase();
  }

  return (parts[0][0] + parts[1][0]).toUpperCase();
}

/* LAST MESSAGE */
async function getLastMessage(conversationId){
  const { data, error } = await sb2
    .from("messages")
    .select("*")
    .eq("conversation_id", conversationId)
    .order("created_at", { ascending:false })
    .limit(1)
    .maybeSingle();

  if(error){
    console.error("LAST MESSAGE ERROR:", error);
    return null;
  }

  return data || null;
}

/* UNREAD COUNT */
async function getUnreadCount(conversationId){
  const { count, error } = await sb2
    .from("messages")
    .select("*", { count: "exact", head: true })
    .eq("conversation_id", conversationId)
    .neq("sender_id", user.id)
    .eq("is_read", false);

  if(error){
    console.error("UNREAD COUNT ERROR:", error);
    return 0;
  }

  return count || 0;
}

/* FORMAT TIME */
function formatTime(dateString){
  if(!dateString) return "";
  return new Date(dateString).toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit'
  });
}

/* LOAD INBOX */
async function loadInbox(){
  const list = document.getElementById("list");
  list.innerHTML = `<div class="loading">Loading...</div>`;

  const { data, error } = await sb2
    .from("conversations")
    .select("*")
    .or(`user1.eq.${user.id},user2.eq.${user.id}`)
    .order("updated_at", { ascending:false });

  if(error){
    console.error("LOAD INBOX ERROR:", error);
    list.innerHTML = `<div class="empty">Error loading messages</div>`;
    return;
  }

  if(!data || data.length === 0){
    list.innerHTML = `<div class="empty">No messages yet</div>`;
    return;
  }

  list.innerHTML = "";

  for(const c of data){
    const otherUserId = getOtherUser(c);

    const [realName, lastMsg, unreadCount] = await Promise.all([
      getUserName(otherUserId),
      getLastMessage(c.id),
      getUnreadCount(c.id)
    ]);

    const initials = getInitials(realName);

    const div = document.createElement("div");
    div.className = "chat";

    div.innerHTML = `
      <div class="avatar">${initials}</div>

      <div class="chat-content">
        <div class="top-line">
          <div class="name">${realName}</div>
        </div>

        <div class="last">
          ${lastMsg ? lastMsg.message : "No messages yet"}
        </div>
      </div>

      <div class="right-side">
        <div class="time">${lastMsg ? formatTime(lastMsg.created_at) : ""}</div>
        ${unreadCount > 0 ? `<div class="unread-badge">${unreadCount}</div>` : ``}
      </div>
    `;

    div.onclick = () => openChat(c.id, otherUserId, realName);
    list.appendChild(div);
  }
}

/* OPEN CHAT */
function openChat(chatId, otherUserId, realName){
  localStorage.setItem("chat_id", chatId);
  localStorage.setItem("chat_user", otherUserId);
  localStorage.setItem("chat_name", realName);
  window.location.href = "chat.html";
}

/* INITIAL LOAD */
loadInbox();

/* REALTIME REFRESH */
sb2.channel('inbox-live')
  .on(
    'postgres_changes',
    { event:'*', schema:'public', table:'messages' },
    () => loadInbox()
  )
  .subscribe();

sb2.channel('conversations-live')
  .on(
    'postgres_changes',
    { event:'*', schema:'public', table:'conversations' },
    () => loadInbox()
  )
  .subscribe();
</script>

</body>
</html>
