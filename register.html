<style>
*{

  padding:0;

body{

/* CARD */
.container{

  max-width:420px;
}

.card{
  background:#fff;
  border-radius:18px;
  padding:22px;
  box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

/* HEADER */
.logo{
  text-align:center;
  font-size:1.4rem;
  font-weight:800;
  color:#1f8f4e;
}

.tagline{
  text-align:center;
  font-size:0.85rem;
  color:#6b7280;
  margin-bottom:14px;
}

/* TITLE */
h2{
  text-align:center;
  margin-bottom:10px;
  color:#111827;
}

/* INPUTS */
input, select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:1px solid #e5e7eb;
  border-radius:10px;
  outline:none;
  font-size:14px;
  background:#f9fafb;
}

input:focus, select:focus{
  border-color:#1f8f4e;
  background:#fff;
}

/* BUTTON */
button{
  width:100%;
  padding:13px;
  margin-top:14px;
  border:none;
  border-radius:10px;
  background:#1f8f4e;
  color:#fff;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:translateY(-2px);
}

button:disabled{
  opacity:0.7;
  cursor:not-allowed;
}

/* ALERT */
.alert{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-size:13px;
  font-weight:600;
  display:none;
}

.success{
  display:block;
  background:#16a34a;
  color:#fff;
}

.error{
  display:block;
  background:#dc2626;
  color:#fff;
}

/* FOOTER */
.footer{
  text-align:center;
  margin-top:12px;
  font-size:12px;
  color:#6b7280;
}

.footer a{
  color:#1f8f4e;
  font-weight:700;
  text-decoration:none;
}
</style>
</head>

</div>

function normalizePhone(p){
  let phone=p.trim().replace(/\s+/g,"");
  if(phone.startsWith("+254")) phone=phone.slice(4);
  else if(phone.startsWith("254")) phone=phone.slice(3);
  else if(phone.startsWith("0")) phone=phone.slice(1);
  return "254"+phone;
}

async function syncTokens(userId) {

    const { data, error } = await client
        .from("users")
        .select("token_balance,last_token_update")
        .eq("id", userId)
        .single();

    if (error || !data) return;

    const now = new Date();

    const lastUpdate = data.last_token_update
        ? new Date(data.last_token_update)
        : now;

    // minutes passed while offline OR active
    const minutesPassed = Math.floor((now - lastUpdate) / 60000);

    if (minutesPassed <= 0) return;

    const TOKENS_PER_MINUTE = 1; // CHANGE THIS LATER IF YOU WANT

    const tokensToDeduct = minutesPassed * TOKENS_PER_MINUTE;

    const newBalance = Math.max(
        0,
        Number(data.token_balance) - tokensToDeduct
    );

    await client
        .from("users")
        .update({
            token_balance: newBalance,
            last_token_update: now.toISOString()
        })
        .eq("id", userId);

    console.log("SYNC DONE:", {
        minutesPassed,
        tokensToDeduct,
        newBalance
    });

    return newBalance;
}
