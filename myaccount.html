<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Account - AgriHub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,-apple-system,sans-serif;
}

body{
    background:#eef2f5;
    min-height:100vh;
    padding-bottom:100px;
}

/* Header */

.header{
    background:linear-gradient(135deg,#1f8f4e,#28a95c);
    color:white;
    text-align:center;
    padding:30px 20px 35px;
    border-bottom-left-radius:30px;
    border-bottom-right-radius:30px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.avatar{
    width:80px;
    height:80px;
    border-radius:50%;
    border:4px solid white;
    object-fit:cover;
}

.name{
    margin-top:12px;
    font-size:21px;
    font-weight:800;
}

.status{
    display:inline-block;
    margin-top:10px;
    padding:7px 18px;
    border-radius:50px;
    background:white;
    color:#1f8f4e;
    font-size:13px;
    font-weight:800;
}

/* Cards */

.container{
    padding:18px;
}

.card{
    width:100%;
    background:white;
    border-radius:18px;
    padding:16px;
    margin-bottom:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 3px 12px rgba(0,0,0,.08);
}

.left{
    display:flex;
    align-items:center;
    gap:15px;
}

.icon{
    width:50px;
    height:50px;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:20px;
}

.profile{
    background:#16a34a;
}

.info{
    background:#2563eb;
}

.verify{
    background:#f59e0b;
}

.logout{
    background:#ef4444;
}

.text h3{
    font-size:16px;
    font-weight:700;
    margin-bottom:3px;
}

.text p{
    font-size:13px;
    color:#6b7280;
}

.arrow{
    color:#9ca3af;
    font-size:18px;
}

</style>
</head>

<body>

<div class="header">

<img src="https://i.pravatar.cc/200" class="avatar">

<div class="name">Josiah Kimutai</div>

<div class="status">
Not Verified
</div>

</div>

<div class="card">

<div class="left">

<div class="icon profile">
<i class="fa fa-user"></i>
</div>

<div class="text">
<h3>My Profile</h3>
<p>Edit your profile details</p>
</div>

</div>

<div class="arrow">
<i class="fa fa-chevron-right"></i>
</div>

</div>

<div class="card">

<div class="left">

<div class="icon info">
<i class="fa fa-circle-info"></i>
</div>

<div class="text">
<h3>My Information</h3>
<p>View your account information</p>
</div>

</div>

<div class="arrow">
<i class="fa fa-chevron-right"></i>
</div>

</div>

<div class="card" onclick="location.href='verify.html'">

<div class="left">

<div class="icon verify">
<i class="fa fa-shield-halved"></i>
</div>

<div class="text">
<h3>Farmer Verification</h3>
<p>Verify your AgriHub account</p>
</div>

</div>

<div class="arrow">
<i class="fa fa-chevron-right"></i>
</div>

</div>

<div class="card" onclick="location.href='index.html'">

<div class="left">

<div class="icon logout">
<i class="fa fa-right-from-bracket"></i>
</div>

<div class="text">
<h3>Logout</h3>
<p>Sign out of your account</p>
</div>

</div>

<div class="arrow">
<i class="fa fa-chevron-right"></i>
</div>

</div>

</body>
</html>
