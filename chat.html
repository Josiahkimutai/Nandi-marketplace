<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat - AgriHub</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{
      box-sizing:border-box;
    }

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#efeae2;
}

/* MAIN CHAT */

.chat-wrapper{
    width:100%;
    max-width:900px;
    height:100vh;
    background:#efeae2;
    display:flex;
    flex-direction:column;
}

/* HEADER */

.header{
    height:70px;
    background:#075e54;
    color:#fff;
    display:flex;
    align-items:center;
    padding:0 15px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    z-index:10;
}

.back-btn{
    width:42px;
    height:42px;
    border:none;
    background:none;
    color:white;
    font-size:24px;
    cursor:pointer;
}

.header-avatar{
    width:48px;
    height:48px;
    border-radius:50%;
    background:#25d366;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:bold;
    font-size:18px;
    margin:0 12px;
}

.header-info{
    flex:1;
}

.header-name{
    font-size:17px;
    font-weight:bold;
}

.header-status{
    font-size:12px;
    color:#d7ffd9;
}

.menu-btn{
    border:none;
    background:none;
    color:white;
    font-size:24px;
    cursor:pointer;
}

/* CHAT */

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;

    background:#ece5dd;
    background-image:
    radial-gradient(circle at 25px 25px,#ffffff22 2px,transparent 2px);

    scroll-behavior:smooth;
}

/* ROW */

.msg-row{
    display:flex;
    width:100%;
}

.msg-row.me{
    justify-content:flex-end;
}

.msg-row.other{
    justify-content:flex-start;
}

/* MESSAGE */

.msg{
    max-width:75%;
    padding:10px 14px;
    border-radius:18px;
    position:relative;
    animation:fade .25s ease;
    box-shadow:0 1px 3px rgba(0,0,0,.12);
}

.msg.me{
    background:#dcf8c6;
    border-bottom-right-radius:5px;
}

.msg.other{
    background:white;
    border-bottom-left-radius:5px;
}

.msg-text{
    white-space:pre-wrap;
    word-break:break-word;
    font-size:15px;
    line-height:1.45;
}

.time{
    text-align:right;
    font-size:11px;
    color:#777;
    margin-top:6px;
}

/* INPUT */

.input-box{
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px;
    background:#f0f2f5;
    border-top:1px solid #ddd;
}

.emoji-btn,
.attach-btn{
    width:42px;
    height:42px;
    border:none;
    border-radius:50%;
    background:white;
    font-size:22px;
    cursor:pointer;
}

#msgInput{
    flex:1;
    height:46px;
    border:none;
    border-radius:25px;
    padding:0 18px;
    font-size:15px;
    outline:none;
    background:white;
}

.send-btn{
    width:46px;
    height:46px;
    border:none;
    border-radius:50%;
    background:#25d366;
    color:white;
    font-size:20px;
    cursor:pointer;
    transition:.2s;
}

.send-btn:hover{
    transform:scale(1.08);
}

.send-btn:disabled{
    opacity:.6;
    cursor:not-allowed;
}

/* EMPTY CHAT */

.empty-chat{
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
    color:#666;
    text-align:center;
}

/* ANIMATION */

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(8px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* MOBILE */

@media(max-width:768px){

.chat-wrapper{
    width:100%;
    height:100%;
}

.msg{
    max-width:85%;
}

.header{
    padding:0 10px;
}

.header-name{
    font-size:16px;
}

#msgInput{
    font-size:14px;
}

}
  </style>
</head>

<body>

<div class="chat-wrapper">
  <div class="header">

    <button class="back-btn" onclick="history.back()">←</button>

    <div class="header-avatar" id="headerAvatar">U</div>

    <div class="header-info">
        <div class="header-name" id="name">Loading...</div>

        <div class="header-status" id="chatStatus">
            🟢 Online
        </div>
    </div>

    <button class="menu-btn">⋮</button>

</div>

  <div class="chat-box" id="chatBox">
    <div class="empty-chat">Loading messages...</div>
  </div>

  <div class="input-box">

<button class="emoji-btn">
😊
</button>

<input
id="msgInput"
placeholder="Type a message..."
>

<button class="attach-btn">
📎
</button>

<button
class="send-btn"
id="sendBtn">
➤
</button>

</div>
</div>

<script>
/* =========================================================
   IMPORTANT:
   USE THE EXACT SAME URL + ANON KEY IN ALL YOUR FILES
   index.html / inbox.html / chat.html / dashboard pages
========================================================= */
const SUPABASE_URL = "https://wfbepkegbtxszhhozqtz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmYmVwa2VnYnR4c3poaG96cXR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMjE4NjEsImV4cCI6MjA5NzY5Nzg2MX0.RkyZ4Jszz9KbNP9fk4MldMX2S1416eYFR8GHhPzRGJc";

const sb2 = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    persistSession: false,
    autoRefreshToken: false
  }
});
window.addEventListener("beforeunload", () => {
  const user = JSON.parse(localStorage.getItem("agrihub_user"));
  if (!user) return;

  sb2.from("users")
    .update({
      online: false,
      last_seen: new Date().toISOString()
    })
    .eq("id", user.id);
});
const user = JSON.parse(localStorage.getItem("agrihub_user"));
const chatId = localStorage.getItem("chat_id");
const chatName = localStorage.getItem("chat_name");
const chatUser = localStorage.getItem("chat_user");

if(!user){
  window.location.href = "index.html";
}

if(!chatId){
  window.location.href = "inbox.html";
}

const chatBox = document.getElementById("chatBox");
const msgInput = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");

/* SAFE HTML */
function escapeHtml(text){
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

/* INITIALS */
function getInitials(name){
  if(!name) return "U";
  const parts = name.trim().split(/\s+/).filter(Boolean);
  if(parts.length === 1) return parts[0].charAt(0).toUpperCase();
  return (parts[0][0] + parts[1][0]).toUpperCase();
}

/* HEADER */
function setHeaderName(){
  const safeName = chatName || "Chat";
  document.getElementById("name").innerText = safeName;
  document.getElementById("headerAvatar").innerText = getInitials(safeName);
  document.getElementById("chatStatus").innerText = "AgriHub Chat";
}

/* FORMAT TIME */
function formatTime(dateString){
  if(!dateString) return "";
  const d = new Date(dateString);
  if(isNaN(d.getTime())) return "";
  return d.toLocaleTimeString([], {
    hour: "2-digit",
    minute: "2-digit"
  });
}

/* SHOW ERROR ON SCREEN */
function showError(message){
  chatBox.innerHTML = `<div class="empty-chat">${message}</div>`;
}

/* MARK OTHER PERSON'S MESSAGES AS READ */
async function markAsRead(){
  try{
    const { error } = await sb2
      .from("messages")
      .update({ is_read: true })
      .eq("conversation_id", chatId)
      .neq("sender_id", user.id)
      .eq("is_read", false);

    if(error){
      console.error("MARK AS READ ERROR:", error);
    }
  }catch(err){
    console.error("MARK AS READ CATCH:", err);
  }
}

/* UPDATE CONVERSATION TIME */
async function touchConversation(){
  try{
    const { error } = await sb2
      .from("conversations")
      .update({ updated_at: new Date().toISOString() })
      .eq("id", chatId);

    if(error){
      console.error("UPDATE CONVERSATION TIME ERROR:", error);
    }
  }catch(err){
    console.error("TOUCH CONVERSATION CATCH:", err);
  }
}

/* LOAD MESSAGES */
async function loadMessages(){
  chatBox.innerHTML = `<div class="empty-chat">Loading messages...</div>`;

  try{
    const { data, error } = await sb2
      .from("messages")
      .select("id, conversation_id, sender_id, message, created_at, is_read")
      .eq("conversation_id", chatId)
      .order("created_at", { ascending: true });

    if(error){
      console.error("LOAD MESSAGES ERROR:", error);

      if(error.code === "PGRST301" || error.message?.includes("JWT") || error.message?.includes("Unauthorized")){
        showError("Unauthorized Supabase key. Replace your anon key in chat.html.");
      }else{
        showError("Failed to load messages");
      }
      return;
    }

    chatBox.innerHTML = "";

    if(!data || data.length === 0){
      chatBox.innerHTML = `<div class="empty-chat">No messages yet. Start the conversation.</div>`;
      return;
    }

    data.forEach(m => {
      const mine = String(m.sender_id) === String(user.id);

      const row = document.createElement("div");
      row.className = "msg-row " + (mine ? "me" : "other");

      row.innerHTML = `
        <div class="msg ${mine ? "me" : "other"}">
          <div class="msg-text">${escapeHtml(m.message || "")}</div>
          <div class="time">${formatTime(m.created_at)}</div>
        </div>
      `;

      chatBox.appendChild(row);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
    await markAsRead();

  }catch(err){
    console.error("LOAD MESSAGES CATCH:", err);
    showError("Failed to load messages");
  }
}

/* SEND MESSAGE */
async function sendMessage(){
  const text = msgInput.value.trim();
  if(!text) return;

  sendBtn.disabled = true;
  sendBtn.textContent = "Sending...";

  try{
    const { error } = await sb2
      .from("messages")
      .insert([{
        conversation_id: chatId,
        sender_id: user.id,
        message: text,
        is_read: false
      }]);

    if(error){
      console.error("SEND MESSAGE ERROR:", error);

      if(error.code === "PGRST301" || error.message?.includes("JWT") || error.message?.includes("Unauthorized")){
        alert("Unauthorized Supabase key. Replace your anon key in chat.html.");
      }else{
        alert("Failed to send message");
      }

      sendBtn.disabled = false;
      sendBtn.textContent = "Send";
      return;
    }

    msgInput.value = "";
    await touchConversation();
    await loadMessages();

  }catch(err){
    console.error("SEND MESSAGE CATCH:", err);
    alert("Failed to send message");
  }

  sendBtn.disabled = false;
  sendBtn.textContent = "Send";
}

/* ENTER TO SEND */
msgInput.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener("click", sendMessage);

/* INIT */
setHeaderName();
loadMessages();
window.addEventListener("DOMContentLoaded", () => {
  setHeaderName();
  loadMessages();
  loadUserStatus();

  setInterval(loadUserStatus, 30000);
});

/* REALTIME (optional - if realtime fails, chat still works) */
try{
  sb2.channel("chat-live-" + chatId)
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "messages",
        filter: `conversation_id=eq.${chatId}`
      },
      async () => {
        await loadMessages();
      }
    )
    .subscribe((status) => {
      console.log("Realtime status:", status);
    });
}catch(err){
  console.warn("Realtime could not start:", err);
}
async function loadUserStatus() {
  if (!chatUser) {
    console.log("No chatUser found in localStorage");
    return;
  }

  try {
    const { data, error } = await sb2
      .from("users")
      .select("online, last_seen")
      .eq("id", chatUser)
      .maybeSingle();

    if (error) {
      console.error("STATUS LOAD ERROR:", error);
      return;
    }

    const statusEl = document.getElementById("chatStatus");
    if (!statusEl) return;

    if (!data) {
      statusEl.innerText = "Unknown status";
      return;
    }

    if (data.online === true) {
      statusEl.innerText = "🟢 Online";
    } else {
      statusEl.innerText = "last seen " + formatLastSeen(data.last_seen);
    }

  } catch (err) {
    console.error("STATUS CATCH:", err);
  }
}
function formatLastSeen(dateString) {
  if (!dateString) return "a while ago";

  const diff = Date.now() - new Date(dateString).getTime();

  const mins = Math.floor(diff / 60000);
  const hrs = Math.floor(mins / 60);
  const days = Math.floor(hrs / 24);

  if (mins < 1) return "just now";
  if (mins < 60) return mins + " min ago";
  if (hrs < 24) return hrs + " hr ago";
  return days + " day(s) ago";
}
</script>
<script src="tokenEngine.js"></script>
</body>
</html>
