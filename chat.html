<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat - AgriHub</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:system-ui, Arial, sans-serif;
      background:#d9dbd5;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .chat-wrapper{
      width:100%;
      max-width:820px;
      height:86vh;
      background:white;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 10px 35px rgba(0,0,0,0.15);
      display:flex;
      flex-direction:column;
    }

    .header{
      background:#075e54;
      color:white;
      padding:14px 16px;
      display:flex;
      align-items:center;
      gap:12px;
      flex-shrink:0;
    }

    .back{
      color:white;
      text-decoration:none;
      font-weight:700;
      font-size:14px;
    }

    .header-avatar{
      width:40px;
      height:40px;
      border-radius:50%;
      background:#1f8f4e;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      color:white;
      flex-shrink:0;
    }

    .header-info{
      display:flex;
      flex-direction:column;
      min-width:0;
    }

    .header-name{
      font-weight:800;
      font-size:16px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .header-status{
      font-size:12px;
      opacity:0.9;
    }

    .chat-box{
      flex:1;
      overflow-y:auto;
      padding:18px;
      background:#efeae2;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .msg-row{
      display:flex;
      width:100%;
    }

    .msg-row.me{
      justify-content:flex-end;
    }

    .msg-row.other{
      justify-content:flex-start;
    }

    .msg{
      max-width:min(72%, 520px);
      padding:10px 12px 8px;
      border-radius:12px;
      font-size:14px;
      line-height:1.4;
      position:relative;
      word-wrap:break-word;
      box-shadow:0 1px 1px rgba(0,0,0,0.08);
    }

    .msg.me{
      background:#dcf8c6;
      border-top-right-radius:4px;
    }

    .msg.other{
      background:white;
      border-top-left-radius:4px;
    }

    .msg-text{
      white-space:pre-wrap;
    }

    .time{
      font-size:10px;
      color:#667781;
      margin-top:5px;
      text-align:right;
    }

    .input-box{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px;
      background:#f0f2f5;
      border-top:1px solid #ddd;
      flex-shrink:0;
    }

    #msgInput{
      flex:1;
      padding:12px 14px;
      border-radius:24px;
      border:1px solid #d1d7db;
      outline:none;
      font-size:14px;
      background:white;
    }

    #msgInput:focus{
      border-color:#25d366;
    }

    .send-btn{
      background:#075e54;
      color:white;
      border:none;
      padding:11px 18px;
      border-radius:24px;
      cursor:pointer;
      font-weight:700;
    }

    .send-btn:hover{
      background:#0b6b5f;
    }

    .empty-chat{
      margin:auto;
      text-align:center;
      color:#667781;
      font-size:14px;
      background:rgba(255,255,255,0.8);
      padding:16px 20px;
      border-radius:12px;
    }

    @media (max-width: 768px){
      body{
        padding:0;
        background:#efeae2;
      }

      .chat-wrapper{
        max-width:100%;
        height:100vh;
        border-radius:0;
      }

      .msg{
        max-width:82%;
      }
    }
  </style>
</head>

<body>

<div class="chat-wrapper">
  <div class="header">
    <a class="back" href="inbox.html">← Back</a>

    <div class="header-avatar" id="headerAvatar">U</div>

    <div class="header-info">
      <div class="header-name" id="name">Chat</div>
      <div class="header-status" id="chatStatus">AgriHub Chat</div>
    </div>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="empty-chat">Loading messages...</div>
  </div>

  <div class="input-box">
    <input id="msgInput" placeholder="Type a message..." autocomplete="off">
    <button class="send-btn" id="sendBtn">Send</button>
  </div>
</div>

<script>
/* =========================================================
   IMPORTANT:
   USE THE EXACT SAME URL + ANON KEY IN ALL YOUR FILES
   index.html / inbox.html / chat.html / dashboard pages
========================================================= */
const SUPABASE_URL = "https://wfbepkegbtxszhhozqtz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmYmVwa2VnYnR4c3poaG96cXR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMjE4NjEsImV4cCI6MjA5NzY5Nzg2MX0.RkyZ4Jszz9KbNP9fk4MldMX2S1416eYFR8GHhPzRGJc";

const sb2 = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    persistSession: false,
    autoRefreshToken: false
  }
});

const user = JSON.parse(localStorage.getItem("agrihub_user"));
const chatId = localStorage.getItem("chat_id");
const chatName = localStorage.getItem("chat_name");
const chatUser = localStorage.getItem("chat_user");

if(!user){
  window.location.href = "index.html";
}

if(!chatId){
  window.location.href = "inbox.html";
}

const chatBox = document.getElementById("chatBox");
const msgInput = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");

/* SAFE HTML */
function escapeHtml(text){
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

/* INITIALS */
function getInitials(name){
  if(!name) return "U";
  const parts = name.trim().split(/\s+/).filter(Boolean);
  if(parts.length === 1) return parts[0].charAt(0).toUpperCase();
  return (parts[0][0] + parts[1][0]).toUpperCase();
}

/* HEADER */
function setHeaderName(){
  const safeName = chatName || "Chat";
  document.getElementById("name").innerText = safeName;
  document.getElementById("headerAvatar").innerText = getInitials(safeName);
  document.getElementById("chatStatus").innerText = "AgriHub Chat";
}

/* FORMAT TIME */
function formatTime(dateString){
  if(!dateString) return "";
  const d = new Date(dateString);
  if(isNaN(d.getTime())) return "";
  return d.toLocaleTimeString([], {
    hour: "2-digit",
    minute: "2-digit"
  });
}

/* SHOW ERROR ON SCREEN */
function showError(message){
  chatBox.innerHTML = `<div class="empty-chat">${message}</div>`;
}

/* MARK OTHER PERSON'S MESSAGES AS READ */
async function markAsRead(){
  try{
    const { error } = await sb2
      .from("messages")
      .update({ is_read: true })
      .eq("conversation_id", chatId)
      .neq("sender_id", user.id)
      .eq("is_read", false);

    if(error){
      console.error("MARK AS READ ERROR:", error);
    }
  }catch(err){
    console.error("MARK AS READ CATCH:", err);
  }
}

/* UPDATE CONVERSATION TIME */
async function touchConversation(){
  try{
    const { error } = await sb2
      .from("conversations")
      .update({ updated_at: new Date().toISOString() })
      .eq("id", chatId);

    if(error){
      console.error("UPDATE CONVERSATION TIME ERROR:", error);
    }
  }catch(err){
    console.error("TOUCH CONVERSATION CATCH:", err);
  }
}

/* LOAD MESSAGES */
async function loadMessages(){
  chatBox.innerHTML = `<div class="empty-chat">Loading messages...</div>`;

  try{
    const { data, error } = await sb2
      .from("messages")
      .select("id, conversation_id, sender_id, message, created_at, is_read")
      .eq("conversation_id", chatId)
      .order("created_at", { ascending: true });

    if(error){
      console.error("LOAD MESSAGES ERROR:", error);

      if(error.code === "PGRST301" || error.message?.includes("JWT") || error.message?.includes("Unauthorized")){
        showError("Unauthorized Supabase key. Replace your anon key in chat.html.");
      }else{
        showError("Failed to load messages");
      }
      return;
    }

    chatBox.innerHTML = "";

    if(!data || data.length === 0){
      chatBox.innerHTML = `<div class="empty-chat">No messages yet. Start the conversation.</div>`;
      return;
    }

    data.forEach(m => {
      const mine = String(m.sender_id) === String(user.id);

      const row = document.createElement("div");
      row.className = "msg-row " + (mine ? "me" : "other");

      row.innerHTML = `
        <div class="msg ${mine ? "me" : "other"}">
          <div class="msg-text">${escapeHtml(m.message || "")}</div>
          <div class="time">${formatTime(m.created_at)}</div>
        </div>
      `;

      chatBox.appendChild(row);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
    await markAsRead();

  }catch(err){
    console.error("LOAD MESSAGES CATCH:", err);
    showError("Failed to load messages");
  }
}

/* SEND MESSAGE */
async function sendMessage(){
  const text = msgInput.value.trim();
  if(!text) return;

  sendBtn.disabled = true;
  sendBtn.textContent = "Sending...";

  try{
    const { error } = await sb2
      .from("messages")
      .insert([{
        conversation_id: chatId,
        sender_id: user.id,
        message: text,
        is_read: false
      }]);

    if(error){
      console.error("SEND MESSAGE ERROR:", error);

      if(error.code === "PGRST301" || error.message?.includes("JWT") || error.message?.includes("Unauthorized")){
        alert("Unauthorized Supabase key. Replace your anon key in chat.html.");
      }else{
        alert("Failed to send message");
      }

      sendBtn.disabled = false;
      sendBtn.textContent = "Send";
      return;
    }

    msgInput.value = "";
    await touchConversation();
    await loadMessages();

  }catch(err){
    console.error("SEND MESSAGE CATCH:", err);
    alert("Failed to send message");
  }

  sendBtn.disabled = false;
  sendBtn.textContent = "Send";
}

/* ENTER TO SEND */
msgInput.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener("click", sendMessage);

/* INIT */
setHeaderName();
loadMessages();

/* REALTIME (optional - if realtime fails, chat still works) */
try{
  sb2.channel("chat-live-" + chatId)
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "messages",
        filter: `conversation_id=eq.${chatId}`
      },
      async () => {
        await loadMessages();
      }
    )
    .subscribe((status) => {
      console.log("Realtime status:", status);
    });
}catch(err){
  console.warn("Realtime could not start:", err);
}
</script>

</body>
</html>
