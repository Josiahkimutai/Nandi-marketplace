function cleanWhatsAppNumber(raw) {
    if (!raw) return null;

    let value = raw.trim().replace(/[^\d+]/g, "");

    if (value.startsWith("+")) value = value.slice(1);
    if (value.startsWith("0")) value = "254" + value.slice(1);

    return value;
}

async function addProduct() {
    const btn = document.getElementById("postBtn");
    const msg = document.getElementById("msg");

    try {
        btn.disabled = true;
        btn.innerText = "Posting...";

        clearMsg();

        const user = getCurrentUser();
        if (!user) {
            showMsg("Session expired. Please login again.", "error");
            window.location.href = "index.html";
            return;
        }

        // ===== GET BASIC FIELDS (from dynamic form) =====
        const category = document.getElementById("category").value;
        const name = document.getElementById("name")?.value;
        const price = document.getElementById("price")?.value;
        const location = document.getElementById("location")?.value;
        const description = document.getElementById("description")?.value;
        const whatsapp = cleanWhatsAppNumber(document.getElementById("whatsapp")?.value);

        // ===== VALIDATION =====
        if (!category || !name || !price || !location) {
            showMsg("Please fill all required fields (*)", "error");
            btn.disabled = false;
            btn.innerText = "Post Product";
            return;
        }

       // ===== IMAGE UPLOAD (OPTIONAL) =====
let image_url = null;
const fileInput = document.getElementById("imageFile");

if (fileInput && fileInput.files.length > 0) {
    const file = fileInput.files[0];
    const fileName = `${Date.now()}-${file.name}`;

    const { data: uploadData, error: uploadError } = await sb
        .storage
        .from("product-images")   // ✅ FIXED BUCKET NAME
        .upload(fileName, file);

    if (uploadError) {
        console.error(uploadError);
        showMsg("Image upload failed", "error");
        btn.disabled = false;
        btn.innerText = "Post Product";
        return;
    }

    const { data } = sb.storage
        .from("product-images")   // ✅ FIXED HERE TOO
        .getPublicUrl(fileName);

    image_url = data.publicUrl;
}

        // ===== BUILD PRODUCT DATA =====
        const productData = {
            user_id: user.id,
            seller_name: user.full_name || "Farmer",
            whatsapp_number: whatsapp,
            category,
            name,
            price,
            location,
            description,
            image_url,
            created_at: new Date()
        };

        // ===== INSERT INTO SUPABASE =====
        const { error } = await sb
            .from("products")
            .insert([productData]);

            showMsg("Product posted successfully!", "success");

document.getElementById("dynamicForm").innerHTML = "";

setTimeout(() => {

}, 1200);
            // reset form

            document.getElementById("category").value = "";
        }
