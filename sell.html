    button{

    button:hover{

    button:disabled{

    .msg{

      padding:12px;
      border-radius:12px;
      text-align:center;
      font-size:14px;
      font-weight:700;

    }

    .success{
      background:#dcfce7;
      color:#166534;
      border:1px solid #bbf7d0;
    }

    .error{
      background:#fee2e2;

    .back-link{

    .back-link:hover{

<script>
const SUPABASE_URL = "https://wfbepkegbtxszhhozqtz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmYmVwa2VnYnR4c3poaG96cXR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMjE4NjEsImV4cCI6MjA5NzY5Nzg2MX0.RkyZ4Jszz9KbNP9fk4MldMX2S1416eYFR8GHhPzRGJc";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ================= USER ================= */
function getCurrentUser() {
    try {
        const raw = localStorage.getItem("agrihub_user");
        if (!raw || raw === "null") return null;

        const user = JSON.parse(raw);
        if (!user?.id) return null;

        return user;

    } catch (e) {
        console.error(e);
        return null;
    }
}

let currentUser = getCurrentUser();

if (!currentUser) {
    alert("Session expired");
    window.location.href = "index.html";
}

document.getElementById("sellerBox").innerText =
    "Logged in as: " + (currentUser.full_name || "Farmer");

/* ================= GLOBAL IMAGE STORE (FIX) ================= */
let selectedImages = [];

/* ================= CATEGORY ================= */
function selectCategory(category, element) {

    document.getElementById("category").value = category;

    document.querySelectorAll(".category-card")
        .forEach(c => c.classList.remove("active"));

    element.classList.add("active");

    document.getElementById("categorySection").style.display = "none";

    renderForm();
}

function backCategories() {
    selectedImages = [];

    document.getElementById("dynamicForm").innerHTML = "";
    document.getElementById("categorySection").style.display = "block";
    document.getElementById("category").value = "";
}

/* ================= RENDER FORM ================= */
function renderForm() {

    const category = document.getElementById("category").value;
    const container = document.getElementById("dynamicForm");

    let html = `
        <button onclick="backCategories()" style="margin-bottom:20px;">
            ← Back
        </button>

        <h2>${category.toUpperCase()}</h2>

        <div class="form-group">
            <label>Product Name *</label>
            <input id="name">
        </div>

        <div class="form-group">
            <label>Price *</label>
            <input id="price" type="number">
        </div>
    `;

    html += `
        <div class="form-group">
            <label>Location *</label>
            <input id="location">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea id="description"></textarea>
        </div>

        <div class="form-group">
            <label>WhatsApp</label>
            <input id="whatsapp">
        </div>

        <div class="form-group">
            <label>Images (max 7)</label>

            <input type="file" id="images" accept="image/*" multiple>

            <p id="imageCount">0 / 7 selected</p>

            <div id="imagePreview"></div>
        </div>
    `;

    container.innerHTML = html;
}

/* ================= IMAGE FIX (IMPORTANT) ================= */
document.addEventListener("change", function (e) {

    if (e.target && e.target.id === "images") {

        const files = Array.from(e.target.files);

        files.forEach(file => {
            if (selectedImages.length < 7) {
                selectedImages.push(file);
            }
        });

        renderImages();
    }
});

/* ================= IMAGE PREVIEW ================= */
function renderImages() {

    const preview = document.getElementById("imagePreview");
    const counter = document.getElementById("imageCount");

    preview.innerHTML = "";

    counter.innerText = `${selectedImages.length} / 7 selected`;

    selectedImages.forEach((file, i) => {

        const div = document.createElement("div");

        const img = document.createElement("img");
        img.style.width = "90px";
        img.style.height = "90px";
        img.style.objectFit = "cover";

        const label = document.createElement("div");
        label.innerText = `${i + 1}. ${file.name}`;

        const reader = new FileReader();
        reader.onload = e => img.src = e.target.result;
        reader.readAsDataURL(file);

        div.appendChild(img);
        div.appendChild(label);

        preview.appendChild(div);
    });
}
function showMsg(text, type) {
    const msg = document.getElementById("msg");

    if (!msg) {
        console.error("Message box (#msg) not found");
        return;
    }

    msg.style.display = "block";
    msg.className = "msg " + type;
    msg.innerText = text;
}function clearMsg() {
    const msg = document.getElementById("msg");

    if (!msg) return;

    msg.style.display = "none";
    msg.className = "msg";
    msg.innerText = "";
}
function cleanWhatsAppNumber(raw) {

    if (!raw) return null;

    let value = raw.trim();

    value = value.replace(/[^\d+]/g, "");

    if (value.startsWith("0")) {
        value = "254" + value.slice(1);
    }

    if (value.startsWith("+")) {
        value = value.substring(1);
    }
/* ================= GPS LOCATION ================= */

function getCurrentLocation() {

    return new Promise((resolve, reject) => {

        if (!navigator.geolocation) {
            reject("Geolocation not supported");
            return;
        }

        navigator.geolocation.getCurrentPosition(

            position => {

                resolve({
                    latitude: position.coords.latitude,
                    longitude: position.coords.longitude
                });

            },

            error => reject(error),

            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }

        );

    });

}
    return value;
    /* ================= GPS LOCATION ================= */

}async function addProduct() {

    const btn = document.getElementById("postBtn");

    try {

        btn.disabled = true;
        btn.innerText = "Posting...";

        clearMsg();

        // ================= USER =================
        const user = currentUser;

        if (!user) {
            alert("Session expired. Please login again.");
            window.location.href = "index.html";
            return;
        }

        // ================= FORM VALUES =================
        const category = document.getElementById("category")?.value;
        const name = document.getElementById("name")?.value;
        const price = document.getElementById("price")?.value;
        const location = document.getElementById("location")?.value;
        const description = document.getElementById("description")?.value || "";
        const whatsapp = cleanWhatsAppNumber(document.getElementById("whatsapp")?.value);

        if (!category || !name || !price || !location) {
            showMsg("Please fill all required fields (*)", "error");
            btn.disabled = false;
            btn.innerText = "Post Product";
            return;
        }// ================= GET GPS LOCATION =================
let latitude = null;
let longitude = null;

try {

    const gps = await getCurrentLocation();

    latitude = gps.latitude;
    longitude = gps.longitude;

    console.log("Latitude:", latitude);
    console.log("Longitude:", longitude);

} catch (error) {

    console.error(error);

    showMsg("Please allow location access to post your product.", "error");

    btn.disabled = false;
    btn.innerText = "Post Product";

    return;
}function getCurrentLocation() {
    return new Promise((resolve, reject) => {

        navigator.geolocation.getCurrentPosition(

            position => {

                resolve({
                    latitude: position.coords.latitude,
                    longitude: position.coords.longitude
                });

            },

            error => reject(error),

            {
                enableHighAccuracy: true
            }

        );

    });
}

        // ================= MULTI IMAGE FIX =================
       // ================= MULTI IMAGE FIX =================
let image_urls = [];

// Use ALL selected images, not just the current file input
const files = selectedImages;

if (files.length > 7) {
    showMsg("Maximum 7 images allowed", "error");
    btn.disabled = false;
    btn.innerText = "Post Product";
    return;
}

for (const file of files) {

    const ext = file.name.split(".").pop();
    const fileName = `${crypto.randomUUID()}.${ext}`;

    const { error: uploadError } = await sb.storage
        .from("product-images")
        .upload(fileName, file);

    if (uploadError) {
        console.error(uploadError);
        showMsg("Image upload failed", "error");
        btn.disabled = false;
        btn.innerText = "Post Product";
        return;
    }

    const { data } = sb.storage
        .from("product-images")
        .getPublicUrl(fileName);

    image_urls.push(data.publicUrl);
}
        // ================= SAVE PRODUCT =================
  const { error: insertError } = await sb
.from("products")
.insert([{
    user_id: user.id,
    seller_name: user.full_name || "Farmer",
    category,
    name,
    price,
    location,
    description,
    whatsapp_number: whatsapp,
    image_urls,

    latitude,
    longitude,

    created_at: new Date().toISOString()
}]);
        if (insertError) {
            console.error(insertError);
            showMsg("Failed to post product", "error");
            return;
        }

        // ================= SUCCESS =================
        showMsg("Product posted successfully!", "success");

        // RESET CLEANLY (IMPORTANT FIX)
        selectedImages = [];

const fileInput = document.getElementById("images");
if (fileInput) fileInput.value = "";

        const preview = document.getElementById("imagePreview");
        if (preview) preview.innerHTML = "";

        const counter = document.getElementById("imageCount");
        if (counter) counter.innerText = "0 / 7 selected";

        document.getElementById("dynamicForm").innerHTML = "";

        // redirect FIXED
        setTimeout(() => {
            window.location.href = "farmerdashboard.html";
        }, 1200);

    } catch (err) {
        console.error(err);
        showMsg("Unexpected error occurred", "error");

    } finally {
        btn.disabled = false;
        btn.innerText = "Post Product";
    }
}
</script>
