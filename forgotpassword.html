<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password.</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{
background:#1f8f4e;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.card{
background:#fff;
width:100%;
max-width:380px;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h2{
text-align:center;
margin-bottom:20px;
color:#1f8f4e;
}

input{
width:100%;
padding:13px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#1f8f4e;
color:#fff;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16693a;
}

#msg{
margin-top:15px;
text-align:center;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h2>Reset Password</h2>

<input id="idNumber" placeholder="ID Number">

<input id="phone" placeholder="Phone Number">

<input id="password" type="password" placeholder="New Password">

<input id="confirm" type="password" placeholder="Confirm Password">

<button onclick="resetPassword()">Reset Password</button>

<div id="msg"></div>

</div>

<script>
const sb = supabase.createClient(
"https://wfbepkegbtxszhhozqtz.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmYmVwa2VnYnR4c3poaG96cXR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMjE4NjEsImV4cCI6MjA5NzY5Nzg2MX0.RkyZ4Jszz9KbNP9fk4MldMX2S1416eYFR8GHhPzRGJc"
);

function normalizePhone(p){
let phone=p.trim().replace(/\s+/g,"");
if(phone.startsWith("+254")) phone=phone.slice(4);
else if(phone.startsWith("254")) phone=phone.slice(3);
else if(phone.startsWith("0")) phone=phone.slice(1);
return "254"+phone;
}

async function resetPassword(){

const idNumber=document.getElementById("idNumber").value.trim();
const phone=normalizePhone(document.getElementById("phone").value);
const password=document.getElementById("password").value.trim();
const confirm=document.getElementById("confirm").value.trim();

const msg=document.getElementById("msg");

if(password!==confirm){
msg.style.color="red";
msg.innerText="Passwords do not match";
return;
}

const {data,error}=await sb
.from("users")
.select("*")
.eq("id_number",idNumber)
.eq("phone",phone)
.single();

if(error||!data){
msg.style.color="red";
msg.innerText="ID Number or Phone Number is incorrect";
return;
}

const {error:updateError}=await sb
.from("users")
.update({
password:password
})
.eq("id",data.id);

if(updateError){
msg.style.color="red";
msg.innerText="Password reset failed";
return;
}

msg.style.color="green";
msg.innerText="Password changed successfully.";

setTimeout(()=>{
location.href="index.html";
},1500);

}
</script>

</body>
</html>
